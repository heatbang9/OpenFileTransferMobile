name: CI

on:
  push:
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter create --platforms android,ios .
      - run: ./scripts/configure-android-foreground-service.sh
      - run: ./scripts/configure-ios-local-network.sh
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug
