name: open_file_transfer_mobile
description: OpenFileTransfer mobile client.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  grpc: ^4.1.0
  protobuf: ^4.2.0
  convert: ^3.1.2
  crypto: ^3.0.6
  cryptography: ^2.7.0
  file_picker: ^10.3.3
  flutter_foreground_task: ^9.2.2
  path: ^1.9.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/brand/openfiletransfer-icon-1024.png
  adaptive_icon_background: "#E9FFF6"
  adaptive_icon_foreground: assets/brand/openfiletransfer-icon-1024.png

flutter:
  uses-material-design: true
  assets:
    - assets/brand/openfiletransfer-mark.svg
    - assets/brand/openfiletransfer-icon-generated.png
    - assets/brand/openfiletransfer-icon-1024.png
    - assets/brand/openfiletransfer-icon-512.png
